<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Tended</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf6f0;
      --text: #090d14;
      --text-muted: rgba(9,13,20,0.45);
      --card: #f3ede4;
      --border: rgba(9,13,20,0.08);
      --accent: #5a7a52;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 48px;
      background: rgba(250,246,240,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 0.5px solid var(--border);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--text);
      font-family: 'Fraunces', serif;
      font-size: 18px;
      font-weight: 400;
    }

    .nav-dot { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; flex-shrink: 0; }

    .nav-links { display: flex; align-items: center; gap: 36px; list-style: none; }

    .nav-links a {
      text-decoration: none;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover, .nav-links a.active { color: var(--text); }

    .nav-cta {
      text-decoration: none;
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      padding: 9px 18px;
      border: 0.5px solid rgba(9,13,20,0.2);
      border-radius: 99px;
      transition: background 0.2s;
    }

    .nav-cta:hover { background: var(--card); }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 120px 48px 80px;
    }

    .contact-card {
      background: var(--card);
      border: 0.5px solid var(--border);
      border-radius: 16px;
      padding: 56px;
      max-width: 480px;
    }

    .contact-card h1 {
      font-family: 'Fraunces', serif;
      font-size: 36px;
      font-weight: 300;
      margin-bottom: 16px;
    }

    .contact-card p {
      font-size: 15px;
      color: var(--text-muted);
      margin-bottom: 32px;
      line-height: 1.7;
    }

    .contact-email {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text);
      font-size: 16px;
      font-weight: 500;
      padding: 14px 24px;
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: 99px;
      transition: background 0.2s;
    }

    .contact-email:hover { background: white; }

    footer {
      border-top: 0.5px solid var(--border);
      padding: 48px;
    }

    .footer-top {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 48px;
      margin-bottom: 40px;
    }

    .footer-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Fraunces', serif;
      font-size: 16px;
      font-weight: 400;
      margin-bottom: 8px;
    }

    .footer-tagline { font-size: 13px; color: var(--text-muted); }

    .footer-col h4 {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .footer-col a {
      display: block;
      text-decoration: none;
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 10px;
      transition: color 0.2s;
    }

    .footer-col a:hover { color: var(--text); }

    .footer-bottom {
      border-top: 0.5px solid var(--border);
      padding-top: 24px;
      font-size: 13px;
      color: var(--text-muted);
    }

    @media (max-width: 768px) {
      nav { padding: 16px 24px; }
      .nav-links { display: none; }
      main { padding: 100px 24px 60px; }
      .contact-card { padding: 32px 24px; }
      footer { padding: 40px 24px; }
      .footer-top { grid-template-columns: 1fr; gap: 32px; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <span class="nav-dot"></span>
    Tended
  </a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="apps.html">Apps</a></li>
    <li><a href="story.html">Story</a></li>
    <li><a href="contact.html" class="active">Contact</a></li>
  </ul>
  <a href="apps.html" class="nav-cta">Browse the suite →</a>
</nav>

<main>
  <div class="contact-card">
    <h1>Say hello.</h1>
    <p>For anything. Usually answered within a few days.</p>
    <a href="mailto:hello@tended.app" class="contact-email">
      hello@tended.app
    </a>
  </div>
</main>

<footer>
  <div class="footer-top">
    <div>
      <div class="footer-logo"><span class="nav-dot"></span>Tended</div>
      <p class="footer-tagline">A suite of 17 apps for intentional living.</p>
    </div>
    <div class="footer-col">
      <h4>Pages</h4>
      <a href="index.html">Home</a>
      <a href="apps.html">Apps</a>
      <a href="story.html">Story</a>
      <a href="contact.html">Contact</a>
    </div>
    <div class="footer-col">
      <h4>Contact</h4>
      <a href="mailto:hello@tended.app">hello@tended.app</a>
    </div>
  </div>
  <div class="footer-bottom">© 2026 Tended · Built by Arnav</div>
</footer>

</body>
</html>
